<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <clipPath id="rounded">
      <rect width="128" height="128" rx="20" ry="20"/>
    </clipPath>
  </defs>
  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="128" height="128" fill="#1e1e1e"/>

    <!-- Left slash / -->
    <line x1="38" y1="58" x2="50" y2="22" stroke="#4ec9b0" stroke-width="5" stroke-linecap="round"/>
    <!-- Right slash / -->
    <line x1="78" y1="58" x2="90" y2="22" stroke="#4ec9b0" stroke-width="5" stroke-linecap="round"/>

    <!-- Book: left page -->
    <path d="M 64 78 L 42 78 L 42 106 L 64 106 Z" fill="#282a36" stroke="#d4af37" stroke-width="2"/>
    <!-- Book: right page -->
    <path d="M 64 78 L 86 78 L 86 106 L 64 106 Z" fill="#282a36" stroke="#d4af37" stroke-width="2"/>
    <!-- Book: spine -->
    <line x1="64" y1="78" x2="64" y2="106" stroke="#d4af37" stroke-width="2"/>
    <!-- Left page lines -->
    <line x1="47" y1="84" x2="60" y2="84" stroke="#373949" stroke-width="1.5"/>
    <line x1="47" y1="90" x2="58" y2="90" stroke="#373949" stroke-width="1.5"/>
    <line x1="47" y1="96" x2="60" y2="96" stroke="#373949" stroke-width="1.5"/>
    <!-- Right page lines -->
    <line x1="68" y1="84" x2="81" y2="84" stroke="#373949" stroke-width="1.5"/>
    <line x1="68" y1="90" x2="79" y2="90" stroke="#373949" stroke-width="1.5"/>
    <line x1="68" y1="96" x2="81" y2="96" stroke="#373949" stroke-width="1.5"/>
  </g>
</svg>
